# Save as: .github/workflows/update-readme.yml
name: Update README repos

on:
  schedule:
    - cron: "0 3 * * *"   # daily, 03:00 UTC (05:00 Kigali)
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Rebuild repos section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_repos.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update featured repos"
          git push
